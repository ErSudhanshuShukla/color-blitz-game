<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Color Blitz</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="info">
      <div class="b">
        <i style="color: #ff9800" class="ri-timer-line"></i>
        <span class="timer">0</span>
      </div>
      <div class="high-score">
        <i style="color: #ffd700" class="ri-trophy-fill"></i>
        <span id="highScore">0</span>
      </div>
      <div class="b">
        <span class="score">0</span>
        <i style="color: #fb923c" class="ri-star-fill"></i>
      </div>
    </div>
    <main>
      <div class="gameover">Game<br />Over</div>
      <div class="box"></div>
    </main>
    <button><i style="color: #22c55e" class="ri-play-fill"></i></button>
    <script src="script.js"></script>
  </body>
</html>
